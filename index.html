<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

<title>Interactive Learning App</title>

<style>

/* =========================
   GLOBAL
========================= */

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {

  background: black;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Inter",
    sans-serif;

  overflow: hidden;
}

/* =========================
   APP
========================= */

#app {

  width: 100vw;
  height: 100vh;

  background: #f5f5f7;

  display: flex;
  flex-direction: column;

  overflow: hidden;
}

/* =========================
   VIDEO
========================= */

#videoContainer {

  height: 46%;
  position: relative;

  background: black;
}

#player {

  width: 100%;
  height: 100%;
}

#topOverlay {

  position: absolute;

  top: env(safe-area-inset-top);
  left: 0;

  width: 100%;

  padding: 16px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  z-index: 10;

  color: white;

  pointer-events: none;
}

#videoInfo {

  display: flex;
  align-items: center;
  gap: 12px;
}

#avatar {

  width: 44px;
  height: 44px;

  border-radius: 50%;

  background: rgba(255,255,255,0.2);

  backdrop-filter: blur(10px);
}

#titleWrap h1 {

  font-size: 22px;
  font-weight: 700;
}

#titleWrap p {

  opacity: 0.8;
  font-size: 16px;
}

/* =========================
   GAME AREA
========================= */

#gameContainer {

  flex: 1;

  position: relative;

  overflow: hidden;

  background:
    linear-gradient(
      to bottom,
      #f7f7f8,
      #efeff2
    );
}

/* =========================
   FLOATING BALLS
========================= */

.ball {

  width: 22px;
  height: 22px;

  border-radius: 50%;

  position: absolute;

  filter: blur(0.5px);

  box-shadow:
    0 0 20px rgba(0,0,255,0.35);
}

/* =========================
   SCORE
========================= */

#scoreBoard {

  position: absolute;

  top: 24px;
  left: 24px;

  background: rgba(255,255,255,0.6);

  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,255,255,0.5);

  padding: 14px 20px;

  border-radius: 20px;

  z-index: 20;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.08);

  font-size: 18px;
  font-weight: 600;

  color: black;
}
/* =========================
   QUESTION BOX
========================= */

#questionBox {

  position: absolute;

  left: 50%;
  top: 52%;

  transform:
    translate(-50%, -50%);

  width: 88%;

  background:
    rgba(255,255,255,0.28);

  backdrop-filter: blur(24px);

  border:
    1px solid rgba(255,255,255,0.45);

  border-radius: 32px;

  padding:
    42px 24px;

  z-index: 30;

  text-align: center;

  display: none;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.08);
}

#questionTitle {

  font-size: 22px;

  line-height: 1.4;

  margin-bottom: 28px;

  color: black;

  font-weight: 500;
}

/* =========================
   ANSWERS
========================= */

.answerBtn {

  display: inline-flex;

  align-items: center;
  justify-content: center;

  padding:
    14px 24px;

  margin: 8px;

  border-radius: 999px;

  border:
    1px solid rgba(255,255,255,0.5);

  background:
    rgba(180,190,210,0.42);

  backdrop-filter: blur(10px);

  color: white;

  font-size: 16px;
  font-weight: 500;

  cursor: pointer;

  transition: 0.25s;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.08);
}

.answerBtn:hover {

  transform: scale(1.05);
}

.answerBtn:active {

  transform: scale(0.98);
}

/* =========================
   PLAYER
========================= */

#car {

  width: 92px;
  height: 18px;

  border-radius: 999px;

  position: absolute;

  bottom: 40px;
  left: 140px;

  background:
    linear-gradient(
      to bottom,
      #ff6666,
      #ff1f1f
    );

  box-shadow:
    0 0 30px rgba(255,0,0,0.6);

  z-index: 10;
}

/* =========================
   MOBILE CONTROLS
========================= */

#controls {

  position: absolute;

  width: 100%;

  bottom:
    calc(20px + env(safe-area-inset-bottom));

  display: flex;

  justify-content: space-between;

  padding: 0 24px;

  z-index: 50;
}

.controlBtn {

  width: 88px;
  height: 64px;

  border-radius: 24px;

  border:
    1px solid rgba(255,255,255,0.45);

  background:
    rgba(255,255,255,0.28);

  backdrop-filter: blur(20px);

  color: black;

  font-size: 30px;

  box-shadow:
    0 10px 30px rgba(0,0,0,0.08);

  user-select: none;
}

/* =========================
   FEEDBACK
========================= */

.feedback {

  position: absolute;

  top: 40%;
  left: 50%;

  transform:
    translate(-50%, -50%);

  font-size: 52px;

  font-weight: 700;

  opacity: 0;

  transition: 0.3s;

  z-index: 100;
}

#good {

  color: #00c853;
}

#bad {

  color: #ff1744;
}

.show {

  opacity: 1;
}

</style>
</head>

<body>

<div id="app">

  <!-- VIDEO -->

  <div id="videoContainer">

    <div id="topOverlay">

      <div id="videoInfo">

        <div id="avatar"></div>

        <div id="titleWrap">
          <h1>active recall1</h1>
          <p>wifeyskin</p>
        </div>

      </div>

    </div>

    <div id="player"></div>

  </div>

  <!-- GAME -->

  <div id="gameContainer">

    <div id="scoreBoard">
      Score <span id="scoreValue">0</span>
    </div>

    <div id="questionBox">
      <div id="questionTitle"></div>
      <div id="answers"></div>
    </div>

    <div id="good" class="feedback">+10</div>
    <div id="bad" class="feedback">-5</div>

    <div id="car"></div>

    <div id="controls">

      <button class="controlBtn" id="leftBtn">
        uc0\u9664 
      </button>

      <button class="controlBtn" id="rightBtn">
        uc0\u9654 
      </button>

    </div>

  </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

/* =========================
   STATE
========================= */

let player;

let score = 124;

let questionOpen = false;
let questionAnswered = false;
let questionFired = false;

const question = {

  time: 20,

  question:
    "What makes learning actually stick?",

  options: [
    "Watching more videos",
    "Active recall",
    "Highlighting notes"
  ],

  correct: 1
};

/* =========================
   YOUTUBE
========================= */

function onYouTubeIframeAPIReady() {

  player = new YT.Player('player', {

    videoId: 'k3W4LMm-BBU',

    playerVars: {

      autoplay: 1,
      playsinline: 1

    },

    events: {

      onReady: () => {

        player.playVideo();

        loopTime();

      }

    }

  });

}

/* =========================
   QUESTION SYSTEM
========================= */

function loopTime() {

  if (!player || !player.getCurrentTime) return;

  const t = player.getCurrentTime();

  const inZone =
    Math.abs(t - question.time) < 0.5;

  if (
    inZone &&
    !questionFired &&
    !questionAnswered
  ) {

    questionFired = true;

    player.pauseVideo();

    showQuestion();

  }

  if (!inZone) {

    questionFired = false;
  }

  requestAnimationFrame(loopTime);
}

function showQuestion() {

  questionOpen = true;

  const box =
    document.getElementById("questionBox");

  box.style.display = "block";

  document.getElementById(
    "questionTitle"
  ).innerText = question.question;

  const answers =
    document.getElementById("answers");

  answers.innerHTML = "";

  question.options.forEach((opt, i) => {

    const btn =
      document.createElement("button");

    btn.className = "answerBtn";

    btn.innerText = opt;

    btn.onclick = () => answer(i);

    answers.appendChild(btn);

  });

}

function answer(choice) {

  document.getElementById(
    "questionBox"
  ).style.display = "none";

  questionOpen = false;

  if (choice === question.correct) {

    score += 10;

    flash("good");

    questionAnswered = true;

  } else {

    score = Math.max(0, score - 5);

    flash("bad");
  }

  updateScore();

  player.playVideo();

}

/* =========================
   SCORE
========================= */

function updateScore() {

  document.getElementById(
    "scoreValue"
  ).innerText = score;

}

function flash(id) {

  const el =
    document.getElementById(id);

  el.classList.add("show");

  setTimeout(() => {

    el.classList.remove("show");

  }, 500);

}

/* =========================
   GAME
========================= */

const game =
  document.getElementById("gameContainer");

const car =
  document.getElementById("car");

let carX = 140;

let moveLeft = false;
let moveRight = false;

let balls = [];

/* =========================
   TOUCH CONTROLS
========================= */

const leftBtn =
  document.getElementById("leftBtn");

const rightBtn =
  document.getElementById("rightBtn");

leftBtn.addEventListener(
  "touchstart",
  e => {
    e.preventDefault();
    moveLeft = true;
  }
);

leftBtn.addEventListener(
  "touchend",
  () => moveLeft = false
);

rightBtn.addEventListener(
  "touchstart",
  e => {
    e.preventDefault();
    moveRight = true;
  }
);

rightBtn.addEventListener(
  "touchend",
  () => moveRight = false
);

/* =========================
   DESKTOP KEYS
========================= */

document.addEventListener(
  "keydown",
  e => {

    if (e.key === "ArrowLeft")
      moveLeft = true;

    if (e.key === "ArrowRight")
      moveRight = true;
  }
);

document.addEventListener(
  "keyup",
  e => {

    if (e.key === "ArrowLeft")
      moveLeft = false;

    if (e.key === "ArrowRight")
      moveRight = false;
  }
);

/* =========================
   CREATE BALLS
========================= */

function createBall() {

  const ball =
    document.createElement("div");

  ball.classList.add("ball");

  const colors = [

    "#2d7fff",
    "#5d5fff",
    "#ffcc00",
    "#7f5cff"

  ];

  const color =
    colors[Math.floor(
      Math.random() * colors.length
    )];

  ball.style.background = color;

  ball.x =
    Math.random() *
    (game.offsetWidth - 30);

  ball.y = -20;

  ball.speed =
    2 + Math.random() * 2;

  ball.style.left = ball.x + "px";
  ball.style.top = ball.y + "px";

  game.appendChild(ball);

  balls.push(ball);

}

/* =========================
   LOOP
========================= */

function loop() {

  if (!questionOpen) {

    if (moveLeft)
      carX -= 6;

    if (moveRight)
      carX += 6;

    const maxX =
      game.offsetWidth - 92;

    carX =
      Math.max(
        0,
        Math.min(maxX, carX)
      );

    car.style.left =
      carX + "px";

    if (
      balls.length < 12 &&
      Math.random() < 0.04
    ) {

      createBall();

    }

    balls.forEach((ball, i) => {

      ball.y += ball.speed;

      ball.style.top =
        ball.y + "px";

      const carRect =
        car.getBoundingClientRect();

      const ballRect =
        ball.getBoundingClientRect();

      const hit = !(

        carRect.right < ballRect.left ||
        carRect.left > ballRect.right ||
        carRect.bottom < ballRect.top ||
        carRect.top > ballRect.bottom

      );

      if (hit) {

        score += 1;

        updateScore();

        ball.remove();

        balls.splice(i, 1);

      }

      if (
        ball.y >
        game.offsetHeight + 30
      ) {

        ball.remove();

        balls.splice(i, 1);

      }

    });

  }

  requestAnimationFrame(loop);

}

loop();

</script>

</body>
</html>
